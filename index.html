<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <!-- iOS Safari: prevent automatic detection of phone numbers -->
    <meta name="format-detection" content="telephone=no">
    <!-- iOS Safari: status bar style -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <!-- NOTE: apple-mobile-web-app-capable was deliberately REMOVED. It made
         iOS home-screen launches open the legacy standalone shell with an
         ISOLATED cookie jar (users logged in via Safari landed back on the
         Login screen, with no reload/URL bar). Home-screen behaviour is now
         described by assets/site.webmanifest below instead. -->
    <title>Albayan</title>
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
    
    <!-- Content Security Policy - Production-ready.
         All styling/icons/fonts are bundled locally (assets/), so no CDN hosts
         and no 'unsafe-eval' are needed anymore. -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        font-src 'self' data:;
        img-src 'self' data: blob: https:;
        connect-src 'self' https:;
        form-action 'self';
        base-uri 'self';
        frame-ancestors 'self';
    ">

    <!-- PWA / add-to-homescreen (all self-hosted, CSP default-src 'self';
         PNGs generated by scripts/generate-web-icons.js from resources/icon.png) -->
    <link rel="manifest" href="assets/site.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)">

    <!-- Fonts (self-hosted Inter — see scripts/download-fonts.js) -->
    <link rel="stylesheet" href="assets/fonts.css">

    <!-- Lucide Icons (self-hosted, pinned 1.23.0).
         `defer` keeps this 401KB library from blocking first paint: a classic
         <head> script halts HTML parsing (nothing below it can paint) until
         it is downloaded AND executed. Execution-order note: script.js at the
         end of <body> is a CLASSIC script and runs during parsing, BEFORE
         deferred scripts execute — so window.lucide may not exist while
         script.js evaluates. IconQueue (src/07-i18n-render-core.js) queues
         and retries until it arrives, and init() is gated on DOMContentLoaded,
         which by spec fires only after deferred scripts have run. -->
    <script src="assets/lucide.min.js" defer></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind CSS (prebuilt — run `npm run build:css` after editing classes; see tailwind.config.js).
         IMPORTANT: this link must stay AFTER style.css. The old Tailwind CDN
         injected its generated styles at the end of <head>, so utility classes
         historically override style.css rules of equal specificity; keeping
         that order preserves the app's exact appearance. -->
    <link rel="stylesheet" href="assets/tailwind.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">

    <!-- Perf-lite must be ON before the aurora markup below is parsed, or the
         GPU composites blur(110px) blobs during the entire download + parse
         of the ~2MB script.js (the slowest phase on a phone). This mirrors
         the perf-lite DEFAULT exactly — source of truth:
         isPerformanceModeOn()/applyPerformanceMode() in src/01-platform.js
         (lite unless the stored preference is 'full', localStorage throw =>
         lite). applyPerformanceMode() re-applies the same boolean later, so
         this is idempotent. ES5 on purpose; CSP allows 'unsafe-inline'. -->
    <script>(function(){var full=false;try{full=localStorage.getItem('albayan_perf_mode')==='full'}catch(e){}if(!full)document.body.classList.add('perf-lite')})();</script>

    <!-- Background Noise Texture -->
    <div class="bg-noise"></div>
    
    <!-- Aurora Background -->
    <div id="aurora-bg" class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-50%] left-[-50%] w-[200%] h-[200%] animate-blob opacity-40 dark:opacity-28 mix-blend-multiply dark:mix-blend-color-dodge filter blur-[110px]">
            <div class="absolute top-0 left-0 w-full h-full alb-aurora-1 rounded-full animate-blob"></div>
            <div class="absolute top-0 right-0 w-full h-full alb-aurora-2 rounded-full animate-blob animation-delay-2000"></div>
            <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-full h-full alb-aurora-3 rounded-full animate-blob animation-delay-4000"></div>
        </div>
        <div class="absolute inset-0 bg-white/30 dark:bg-slate-950/78 backdrop-blur-[2px]"></div>
    </div>
    
    <!-- Loading Screen (outside #app so it persists during render) -->
    <div id="app-loading-screen" role="status" aria-live="polite" aria-atomic="true" aria-busy="true" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-50/95 dark:bg-slate-950/95 backdrop-blur-sm transition-opacity duration-300">
        <div class="glass-panel w-full max-w-md p-8 rounded-3xl text-center">
            <div class="w-16 h-16 alb-mark rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-2xl font-bold">A</div>
            <h1 class="text-2xl font-bold text-slate-800 dark:text-white">Albayan</h1>
            <p id="loading-status" class="text-sm text-slate-500 dark:text-slate-300 mt-2">Loading…</p>
            <div class="spinner" style="margin: 24px auto 0;"></div>
        </div>
    </div>
    
    <!-- Main App Container -->
    <div id="app" class="relative z-10"></div>
    
    <!-- Notification Container. Inline z-index:100 keeps toasts ABOVE modal
         overlays (which use z-50): with equal z-index the modal wins because it
         is appended to <body> later, so error toasts rendered blurred UNDER
         the modal backdrop and looked like nothing happened. -->
    <div id="notification-container" class="fixed top-16 right-4 space-y-2 max-w-sm" style="z-index: 100;"></div>
    
    <!-- Cloud Sync Status (top position for visibility) -->
    <div id="sync-status-container" class="fixed top-4 right-4 z-40"></div>
    
    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
