# Alembic configuration for Albayan database migrations.
# See server/MIGRATIONS.md for the beginner guide.
#
# The database URL is NOT stored here — server/migrations/env.py reads it
# from the same environment variables the app uses (DATABASE_URL /
# ALBAYAN_DATABASE_URL / ALBAYAN_DB_PATH), so migrations always target the
# same database as the running app.

[alembic]
script_location = server/migrations
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
