[pytest]
# Pytest configuration for Albayan Manager

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = server

# Output options
addopts = 
    -v
    --tb=short
    --disable-warnings
    -p no:asyncio

# Logging
log_cli = false
log_cli_level = INFO

