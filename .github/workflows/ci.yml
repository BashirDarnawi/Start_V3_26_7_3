name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend tests and generated files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:js
      - run: npm run build
      - run: npm run sync:www
      - run: npm run verify:generated
      - name: Generated files must be committed
        run: git diff --exit-code -- script.js assets/tailwind.css www
      - name: Dependencies must have no known high-severity vulnerability
        run: npm audit --audit-level=high

  backend:
    name: FastAPI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r server/requirements.txt
      - name: Audit Python dependencies
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r server/requirements.txt
      - run: python -m pytest -q -p no:cacheprovider

  postgres-migration:
    name: PostgreSQL migration smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: albayan_ci
          POSTGRES_USER: albayan
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U albayan -d albayan_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://albayan:ci-only-password@127.0.0.1:5432/albayan_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements.txt
      - run: python -m pip install -r server/requirements.txt
      - run: python -m alembic upgrade head
      - run: python -m alembic current
      - name: Query migrated PostgreSQL database
        run: python -c "from sqlalchemy import text; from server.db import get_engine; c=get_engine().connect(); print(c.execute(text('SELECT 1')).scalar_one()); c.close()"

  container:
    name: Docker production smoke test
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-only-password
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build production image
        run: docker build --tag albayan-ci --file server/Dockerfile .
      - name: Start and verify the non-root service
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach --name albayan-ci \
            --publish 127.0.0.1:18080:8000 \
            --env ALBAYAN_COOKIE_SECURE=false \
            --env ALBAYAN_DB_PATH=/tmp/albayan-ci.db \
            albayan-ci
          trap 'docker rm --force albayan-ci >/dev/null 2>&1 || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:18080/api/health >/dev/null; then
              break
            fi
            if [[ "$attempt" == 30 ]]; then
              docker logs albayan-ci
              exit 1
            fi
            sleep 1
          done
          test "$(docker exec albayan-ci id -u)" != "0"

  android:
    name: Android lint and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: npm ci
      - run: npm run build
      - run: npm run sync:www
      - run: npx cap sync android
      - run: chmod +x android/gradlew
      - name: Run Android checks
        working-directory: android
        run: ./gradlew --no-daemon testDebugUnitTest lintDebug

  ios:
    name: iOS simulator build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run sync:www
      - run: npx cap sync ios
      - name: Build without signing
        run: >-
          xcodebuild
          -project ios/App/App.xcodeproj
          -scheme App
          -configuration Debug
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
