apply plugin: 'com.android.application'

// Release signing (required for any bundle uploaded to Google Play).
// Create android/key.properties and a keystore as described in
// android/RELEASE_SIGNING.md. A local release build deliberately fails when
// signing is missing or still contains example values, so an unsigned bundle
// cannot be mistaken for a publishable one.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}

def allowCiUnsignedReleaseBundle =
    System.getenv('GITHUB_ACTIONS') == 'true' &&
    System.getenv('ALBAYAN_CI_ALLOW_UNSIGNED_RELEASE_BUNDLE') == 'true'
def signingErrors = []
def releaseSigningReady = false

if (keystorePropertiesFile.exists()) {
    ['storeFile', 'storePassword', 'keyAlias', 'keyPassword'].each { propertyName ->
        def value = keystoreProperties[propertyName]?.toString()?.trim()
        if (!value || value == 'CHANGE_ME') {
            signingErrors << "${propertyName} is missing or still set to CHANGE_ME"
        }
    }

    if (signingErrors.isEmpty()) {
        def configuredStoreFile = file(keystoreProperties['storeFile'])
        if (!configuredStoreFile.exists()) {
            signingErrors << "storeFile does not exist: ${configuredStoreFile}"
        } else {
            releaseSigningReady = true
        }
    }
}

android {
    namespace = "com.albayan.app"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    defaultConfig {
        applicationId "com.albayan.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (releaseSigningReady) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (releaseSigningReady) {
                signingConfig signingConfigs.release
            }
        }
    }
}

// Attach the guard to every release variant's pre-build lifecycle. This is
// intentionally variant-aware instead of inspecting the command-line task
// names: aggregate tasks such as `gradlew build` also reach preReleaseBuild and
// therefore cannot produce an unsigned release by accident.
android.applicationVariants.configureEach { variant ->
    if (variant.buildType.name == 'release') {
        def capitalizedVariantName = variant.name.capitalize()
        def signingVerificationTask = tasks.register(
            "verify${capitalizedVariantName}SigningConfiguration"
        ) {
            group = 'verification'
            description = "Verify signing before building the ${variant.name} variant"
            doLast {
                if (releaseSigningReady) {
                    return
                }

                if (allowCiUnsignedReleaseBundle && !keystorePropertiesFile.exists()) {
                    logger.warn(
                        'Building an UNSIGNED release bundle for CI validation only. Do not publish it.'
                    )
                    return
                }

                def reason = keystorePropertiesFile.exists()
                    ? signingErrors.join('; ')
                    : 'android/key.properties was not found'
                throw new GradleException(
                    "Cannot build a publishable release: ${reason}. " +
                    'Follow android/RELEASE_SIGNING.md. Never share signing passwords.'
                )
            }
        }
        variant.preBuildProvider.configure {
            dependsOn(signingVerificationTask)
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
